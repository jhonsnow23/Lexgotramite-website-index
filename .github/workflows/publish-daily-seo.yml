name: Publicar artículo SEO diario

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Publicar siguiente artículo y regenerar índices
        run: python scripts/publish_next_article.py

      - name: Enviar sitemap a Search Console e inspeccionar la última URL
        if: ${{ secrets.GSC_CLIENT_ID != '' && secrets.GSC_CLIENT_SECRET != '' && secrets.GSC_REFRESH_TOKEN != '' && secrets.GSC_SITE_URL != '' && secrets.GSC_SITEMAP_URL != '' }}
        env:
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SITEMAP_URL: ${{ secrets.GSC_SITEMAP_URL }}
        run: python scripts/google_search_console_notify.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Publica siguiente artículo SEO"
          git push
